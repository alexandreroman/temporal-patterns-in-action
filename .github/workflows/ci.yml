name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  frontend-check:
    name: Frontend check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.7.0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run checks
        run: make check

  workers-check:
    name: Workers check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: workers
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache-dependency-path: workers/go.sum

      - name: Lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.4
          working-directory: workers

      - name: Vet
        run: make vet

      - name: Test
        run: make test

  frontend-image:
    name: Build frontend image (${{ matrix.arch }})
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [frontend-check]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            arch: amd64
          - os: ubuntu-24.04-arm
            arch: arm64
    env:
      IMAGE: ghcr.io/alexandreroman/temporal-patterns-in-action-frontend
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: frontend
          platforms: linux/${{ matrix.arch }}
          push: true
          tags: ${{ env.IMAGE }}:linux-${{ matrix.arch }}
          cache-from: type=gha,scope=frontend-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=frontend-${{ matrix.arch }}

  frontend-manifest:
    name: Publish frontend multi-arch manifest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [frontend-image]
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    env:
      IMAGE: ghcr.io/alexandreroman/temporal-patterns-in-action-frontend
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-arch manifest
        run: |
          docker buildx imagetools create \
            -t "$IMAGE:latest" \
            -t "$IMAGE:sha-${GITHUB_SHA::7}" \
            "$IMAGE:linux-amd64" \
            "$IMAGE:linux-arm64"

  worker-images:
    name: Build worker image (${{ matrix.pattern }}, ${{ matrix.arch }})
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [workers-check]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        pattern: [saga, batch, encryption, agent]
        arch: [amd64, arm64]
        include:
          - arch: amd64
            os: ubuntu-24.04
          - arch: arm64
            os: ubuntu-24.04-arm
    env:
      IMAGE: ghcr.io/alexandreroman/temporal-patterns-in-action-${{ matrix.pattern }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: workers
          file: workers/${{ matrix.pattern }}/Dockerfile
          platforms: linux/${{ matrix.arch }}
          push: true
          tags: ${{ env.IMAGE }}:linux-${{ matrix.arch }}
          cache-from: type=gha,scope=worker-${{ matrix.pattern }}-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=worker-${{ matrix.pattern }}-${{ matrix.arch }}

  worker-manifests:
    name: Publish worker multi-arch manifest (${{ matrix.pattern }})
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [worker-images]
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        pattern: [saga, batch, encryption, agent]
    env:
      IMAGE: ghcr.io/alexandreroman/temporal-patterns-in-action-${{ matrix.pattern }}
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-arch manifest
        run: |
          docker buildx imagetools create \
            -t "$IMAGE:latest" \
            -t "$IMAGE:sha-${GITHUB_SHA::7}" \
            "$IMAGE:linux-amd64" \
            "$IMAGE:linux-arm64"
