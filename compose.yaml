services:
  temporal:
    image: temporalio/temporal:latest
    command:
      - server
      - start-dev
      - --ip
      - 0.0.0.0
      - --ui-port
      - "8233"
      - --dynamic-config-value
      - matching.useNewMatcher=true
      - --dynamic-config-value
      - matching.enableFairness=true
      - --dynamic-config-value
      - matching.enableMigration=true
    ports:
      - "7233:7233" # gRPC — workers & clients
      - "8233:8233" # Web UI — http://localhost:8233
    healthcheck:
      test: ["CMD-SHELL", "temporal operator cluster health"]
      interval: 10s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
    restart: unless-stopped

  nats:
    image: nats:2-alpine
    command: ["-js", "-m", "8222"]
    ports:
      - "4222:4222" # client protocol — workers & frontend
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8222/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 64M
    restart: unless-stopped

  frontend:
    build: ./frontend
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_NAMESPACE: default
      NATS_URL: nats://nats:4222
    ports:
      - "3000:3000"
    depends_on:
      temporal:
        condition: service_healthy
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 256M
    restart: unless-stopped

  worker-saga:
    build:
      context: ./workers
      dockerfile: saga/Dockerfile
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      NATS_URL: nats://nats:4222
      HEALTH_PORT: 8080
    depends_on:
      temporal:
        condition: service_healthy
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/usr/local/bin/worker", "-healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 64M
    restart: unless-stopped

  worker-batch:
    build:
      context: ./workers
      dockerfile: batch/Dockerfile
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      NATS_URL: nats://nats:4222
      HEALTH_PORT: 8080
    depends_on:
      temporal:
        condition: service_healthy
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/usr/local/bin/worker", "-healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      replicas: ${BATCH_WORKER_REPLICAS:-1}
      resources:
        limits:
          memory: 64M
    restart: unless-stopped

  worker-agent:
    build:
      context: ./workers
      dockerfile: agent/Dockerfile
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      NATS_URL: nats://nats:4222
      HEALTH_PORT: 8080
    depends_on:
      temporal:
        condition: service_healthy
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/usr/local/bin/worker", "-healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 64M
    restart: unless-stopped

  codec-server:
    build:
      context: .
      dockerfile: codec-server/Dockerfile
    environment:
      LISTEN_ADDR: ":8888"
      # Origins allowed to call /decode from the browser. The Temporal Web
      # UI runs on 8233; add others (comma-separated) if needed.
      UI_ORIGIN: "http://localhost:8233,http://127.0.0.1:8233"
    ports:
      - "8888:8888" # http — Temporal Web UI "Remote Codec Endpoint"
    deploy:
      resources:
        limits:
          memory: 64M
    restart: unless-stopped

  worker-encryption:
    build:
      context: ./workers
      dockerfile: encryption/Dockerfile
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      NATS_URL: nats://nats:4222
      HEALTH_PORT: 8080
    depends_on:
      temporal:
        condition: service_healthy
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/usr/local/bin/worker", "-healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 64M
    restart: unless-stopped

  worker-multi-agent:
    build:
      context: ./workers
      dockerfile: multi-agent/Dockerfile
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      NATS_URL: nats://nats:4222
      HEALTH_PORT: 8080
    depends_on:
      temporal:
        condition: service_healthy
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/usr/local/bin/worker", "-healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 64M
    restart: unless-stopped

  worker-entity:
    build:
      context: ./workers
      dockerfile: entity/Dockerfile
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      NATS_URL: nats://nats:4222
      HEALTH_PORT: 8080
    depends_on:
      temporal:
        condition: service_healthy
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/usr/local/bin/worker", "-healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 64M
    restart: unless-stopped

  worker-priority-fairness:
    build:
      context: ./workers
      dockerfile: priority-fairness/Dockerfile
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      NATS_URL: nats://nats:4222
      HEALTH_PORT: 8080
    depends_on:
      temporal:
        condition: service_healthy
      nats:
